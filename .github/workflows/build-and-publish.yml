name: CI & CD

on:
  push:
    branches: [master]

jobs:
  auto_style:
    name: Auto style code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install autopep8
      - name: Auto style code with autopep8
        run: autopep8 --in-place --aggressive --aggressive --recursive . --max-line-length 160 --exclude .tox,.venv,build
      - name: Commit and push if changed
        run: |
          if [[ `git status --porcelain` ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Auto style code with autopep8"
            git push
          else
            echo "No changes detected."
          fi

  build:
    name: Test on python ${{ matrix.python-version }}
    runs-on: [self-hosted, Linux, ARM64, raspi]
    needs: [auto_style]
    container:
      image: python:${{ matrix.python-version }}-slim
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - run: echo "Branch $GITHUB_REF"
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox
      - name: Display Python version
        run: python -c "import sys; print(sys.version)"
      - name: Test with tox
        run: tox -e py${{ fromJSON('{"3.8":"38","3.9":"39","3.10":"310","3.11":"311","3.12":"312","3.13":"313"}')[matrix.python-version] }}

  create_tag:
    name: Create version tag
    needs: [build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      created: ${{ steps.push_tag.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACCESS_TOKEN }}
      - name: Get version from __init__.py
        id: get_version
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'__version__\s*=\s*\"(.+?)\"', open('rtop/__init__.py').read()).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Create and push tag
        id: push_tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.get_version.outputs.version }}" -m "Release ${{ steps.get_version.outputs.version }}"
          git push origin "${{ steps.get_version.outputs.version }}"

  docker:
    name: "Build Docker image"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=ref,event=pr
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: |
          github.actor != 'dependabot[bot]' &&
          github.event_name != 'pull_request' &&
          !startsWith(github.ref, 'refs/heads/feature/') &&
          !contains(github.ref, '.dev') &&
          !contains(github.ref, 'rc')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          push: |
            ${{ github.actor != 'dependabot[bot]' &&
                github.event_name != 'pull_request' &&
                !startsWith(github.ref, 'refs/heads/feature/') &&
                !contains(github.ref, '.dev') &&
                !contains(github.ref, 'rc')
            }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64, linux/arm64

  publish:
    name: Publish to PyPI
    needs: [create_tag]
    if: needs.create_tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
