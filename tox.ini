# This file is part of the rockchip_stats package.

[tox]
envlist = py{3.7,3.8,3.9,3.10,3.11,3.12,3.13}
skip_missing_interpreters = true

[testenv:format]
deps = autopep8
commands = autopep8 --in-place --aggressive --aggressive --recursive . --max-line-length 160 --exclude .tox,.venv,build

[testenv]
setenv =
    TERM=linux
    TERMINFO=/etc/terminfo
    RTOP_TESTING=true
basepython =
    py3.7: python3.7
    py3.8: python3.8
    py3.9: python3.9
    py3.10: python3.10
    py3.11: python3.11
    py3.12: python3.12
    py3.13: python3.13
deps =
    check-manifest>=0.50
    flake8
    pytest
commands =
    check-manifest --ignore=tox.ini --ignore=rtop/tests* --ignore=docs* --ignore=examples*
    python setup.py check -m -s
    flake8 .
    py.test -v

[flake8]
max-line-length = 160
exclude =
    .git,
    .tox,
    .venv*,
    *.egg,
    build,
    test.*,
    data
select = E,W,F
# Ignore alignment/spacing style choices (E241/E221) project-wide,
# and suppress pre-existing issues in files not under active development.
extend-ignore = E241,E221
per-file-ignores =
    rtop/__init__.py: F401
    rtop/__main__.py: F401
    rtop/core/__init__.py: W391
    rtop/core/common.py: F401
    rtop/core/cpu.py: F401
    rtop/core/hw_detect.py: F401,E231
    rtop/core/mpp.py: E741
    rtop/core/npu.py: F401
    rtop/core/process.py: E501
    rtop/core/timer_reader.py: F401
    rtop/gui/__init__.py: F401
    rtop/gui/lib/__init__.py: W391
    rtop/gui/lib/common.py: E127
    rtop/gui/lib/process_table.py: E272
    rtop/gui/pcpu.py: F841
    rtop/gui/pengine.py: F401
    rtop/gui/pall.py: E221
    rtop/gui/rtopgui.py: F401
    rtop/gui/rtopguiconfig.py: F401
    rtop/rockchip_release.py: F401
    rtop/rtop.py: F401,F811
    rtop/tests/conftest.py: F401,E402
    rtop/tests/test_common.py: F401
    rtop/tests/test_hw_detect.py: F401,F841
    examples/rtop_cpu.py: F401
    rtop/core/fan.py: E127
    rtop/service.py: E303

[pytest]
addopts = --ignore=rtop/tests_gui
log_cli_level = DEBUG
log_format = %(asctime)s [%(levelname)s] %(name)s - %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
filterwarnings = ignore:.* is deprecated:DeprecationWarning
